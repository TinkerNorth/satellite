<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Battery — charging (animated)">
  <title>Battery — charging (animated)</title>
  <desc>Battery fill ramps 0→100% over 3s, holds 0.6s, loops. Bolt pulses on a 1.5s independent clock. SMIL animation, no JS required.</desc>
  <rect x="8" y="22" width="42" height="20" rx="3" fill="#8FCFE3"></rect>
  <rect x="50" y="28" width="4" height="8" rx="1" fill="#8FCFE3"></rect>
  <rect x="11" y="25" width="36" height="14" rx="1" fill="#ffffff" opacity="0.55"></rect>
  <rect x="11" y="25" width="0" height="14" rx="1" fill="#8FCFE3">
    <animate attributeName="width" values="0;36;36" keyTimes="0;0.833;1" dur="3.6s" repeatCount="indefinite"></animate>
  </rect>
  <rect x="13" y="27" width="0" height="3" rx="1" fill="#ffffff" opacity="0.55">
    <animate attributeName="width" values="0;0;32;32" keyTimes="0;0.0926;0.833;1" dur="3.6s" repeatCount="indefinite"></animate>
  </rect>
  <g>
    <path fill="#0F1620" d="M 32 24 L 22 34 L 28 34 L 26 42 L 38 30 L 32 30 L 34 24 Z"></path>
    <path fill="#ffffff" opacity="0.55" d="M 32 25.5 L 24 33.5 L 28.5 33.5 L 27 40 L 36 30.5 L 32.5 30.5 L 33.5 25.5 Z">
      <animate attributeName="opacity" values="0.55;0.95;0.55" keyTimes="0;0.5;1" dur="1.5s" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" repeatCount="indefinite"></animate>
    </path>
  </g>
</svg>
