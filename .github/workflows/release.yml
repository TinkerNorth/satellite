name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist)"
        required: true

# Builds release artifacts on all three target platforms in parallel:
#
#   * Windows: builds satellite.exe under MSYS2/MinGW, then runs Inno Setup
#     to produce SatelliteSetup.exe. Code-signed if WIN_SIGN_CERT_BASE64 +
#     WIN_SIGN_PASSWORD are set.
#   * macOS:   builds the *stub* satellite.app (no virtual gamepad — see
#     README "How it works"). Codesigned + notarized if Developer ID secrets
#     are set.
#   * Linux:   builds satellite, packages as .deb and AppImage.
#
# Before any artifact is uploaded, the `gates` job re-runs every PR-time
# check (action-pin lint, allowlist expiry, OSV-Scanner, gitleaks, CodeQL
# wait) against the tagged commit. The `harden` job then scans, signs,
# generates SBOMs, attests, and produces SHA256SUMS.
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout                @ v4.2.2  → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/upload-artifact         @ v4.4.3  → b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
#   actions/download-artifact       @ v4.1.8  → fa0a91b85d4f404e444e00e005971372dc801d16
#   msys2/setup-msys2               @ v2.31.1 → e9898307ac31d1a803454791be09ab9973336e1c
#   anchore/sbom-action             @ v0.17.4 → 8d0a6505bf28ced3e85154d13dc6af83299e13f1
#   anchore/scan-action             @ v3.6.4  → 3343887d815d7b07465f6fdcd395bd66508d486a
#   softprops/action-gh-release     @ v2.0.8  → c062e08bd532815e2082a85e87e3ef29c3e6d191
#   slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml
#                                   @ v2.0.0  → 5a775b367a56d5bd118a224a811bba288150a563
#
# cosign is installed directly from the upstream sigstore/cosign release
# (see the harden job's env block) rather than via cosign-installer
# action — keeps the supply-chain surface minimal.

permissions:
  contents: write
  id-token: write   # required for cosign keyless + SLSA OIDC
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Re-run all PR-time gates against the tagged commit. If any of these
  # fail, none of the build / sign / publish jobs run.
  # ─────────────────────────────────────────────────────────────────────
  gates:
    name: PR-time gates against tag
    uses: ./.github/workflows/_security.yml
    with:
      osv_scan_paths: |
        lib
        vigem/include
      osv_config: osv-scanner.toml
      gitleaks_enabled: true
      dependency_review_enabled: false # PR-only by definition
      action_pin_lint_enabled: true
      allowlist_expiry_enabled: true

  required-secrets:
    name: Required release secrets gate
    needs: [gates]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required signing secrets are present for tagged releases
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
          WIN_SIGN_PASSWORD: ${{ secrets.WIN_SIGN_PASSWORD }}
          DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          # Strict gate only fires for tagged releases. workflow_dispatch
          # runs against feature branches still produce -unsigned artifacts
          # so the pipeline itself is testable without rotating real keys.
          if [ "${{ github.ref_type }}" != "tag" ] || [ "${{ startsWith(github.ref, 'refs/tags/v') }}" != "true" ]; then
            echo "::notice::Non-tag release run — unsigned fallback permitted."
            exit 0
          fi
          missing=()
          [ -z "${WIN_SIGN_CERT_BASE64:-}" ] && missing+=("WIN_SIGN_CERT_BASE64")
          [ -z "${WIN_SIGN_PASSWORD:-}" ] && missing+=("WIN_SIGN_PASSWORD")
          [ -z "${DEVELOPER_ID_APPLICATION_CERT_BASE64:-}" ] && missing+=("DEVELOPER_ID_APPLICATION_CERT_BASE64")
          [ -z "${DEVELOPER_ID_PASSWORD:-}" ] && missing+=("DEVELOPER_ID_PASSWORD")
          [ -z "${APPLE_ID:-}" ] && missing+=("APPLE_ID")
          [ -z "${APPLE_TEAM_ID:-}" ] && missing+=("APPLE_TEAM_ID")
          [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Tagged release on $GITHUB_REF requires platform signing secrets, but the following are missing: ${missing[*]}"
            echo "::error::Add the missing repository secrets and retry the release. Unsigned -unsigned artifacts are NOT permitted for tags."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Per-platform build jobs. Same as the previous release.yml shape but
  # with pinned action SHAs.
  # ─────────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    needs: [gates, required-secrets]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf

      - name: Build satellite.exe
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Run Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss
          if (-not (Test-Path "dist/SatelliteSetup.exe")) {
            throw "iscc did not produce dist/SatelliteSetup.exe"
          }

      - name: Sign installer (if cert configured)
        if: ${{ env.WIN_SIGN_CERT_BASE64 != '' }}
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
          WIN_SIGN_PASSWORD: ${{ secrets.WIN_SIGN_PASSWORD }}
        shell: pwsh
        run: |
          $cert = Join-Path $env:RUNNER_TEMP "code-sign.pfx"
          [IO.File]::WriteAllBytes($cert, [Convert]::FromBase64String($env:WIN_SIGN_CERT_BASE64))
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          & $signtool sign /f $cert /p $env:WIN_SIGN_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            dist/SatelliteSetup.exe

      - name: Stage
        shell: bash
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          suffix=""
          if [ -z "${WIN_SIGN_CERT_BASE64:-}" ]; then
            suffix="-unsigned"
          fi
          mkdir -p stage
          cp dist/SatelliteSetup.exe "stage/SatelliteSetup-${tag}${suffix}.exe"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows
          path: stage/

  macos:
    name: Build macOS (stub)
    needs: [gates, required-secrets]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install dependencies
        run: brew install cmake pkg-config libsodium

      - name: Build satellite.app (stub)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Sign + notarize (if Developer ID configured)
        id: sign
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          CERT_PW: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "${CERT_B64}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Developer ID cert not configured — satellite.app will be uploaded unsigned."
            exit 0
          fi
          KEYCHAIN="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PW}" "${KEYCHAIN}"
          echo "${CERT_B64}" | base64 -d > "${RUNNER_TEMP}/cert.p12"
          security import "${RUNNER_TEMP}/cert.p12" -k "${KEYCHAIN}" -P "${CERT_PW}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN}" "$(security list-keychains -d user | tr -d '"')"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PW}" "${KEYCHAIN}" >/dev/null
          IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN}" | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          codesign --force --options runtime --timestamp --sign "${IDENTITY}" --deep satellite.app
          codesign --verify --strict --deep --verbose=2 satellite.app
          ditto -c -k --keepParent satellite.app "${RUNNER_TEMP}/satellite.zip"
          xcrun notarytool submit "${RUNNER_TEMP}/satellite.zip" \
            --apple-id "${APPLE_ID}" --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" --wait
          xcrun stapler staple satellite.app
          xcrun stapler validate satellite.app
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Stage
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          suffix=""
          if [ "${{ steps.sign.outputs.present }}" != "true" ]; then
            suffix="-unsigned"
          fi
          mkdir -p stage
          # The macOS build is the stub; reflect that in the filename.
          ditto -c -k --sequesterRsrc --keepParent satellite.app \
            "stage/satellite-macos-stub-${tag}${suffix}.zip"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos
          path: stage/

  linux:
    name: Build Linux
    needs: [gates, required-secrets]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config libsodium-dev \
            libayatana-appindicator3-dev libgtk-3-dev \
            file fakeroot rsync wget

      - name: Build satellite
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Stage version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          echo "tag=${tag}"        >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}"  >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          pkg="${RUNNER_TEMP}/satellite-deb"
          mkdir -p "${pkg}/DEBIAN" "${pkg}/usr/bin"
          cp satellite "${pkg}/usr/bin/satellite"
          chmod 755 "${pkg}/usr/bin/satellite"
          cat > "${pkg}/DEBIAN/control" <<EOF
          Package: satellite
          Version: ${{ steps.ver.outputs.version }}
          Section: games
          Priority: optional
          Architecture: amd64
          Depends: libsodium23, libgtk-3-0, libayatana-appindicator3-1
          Maintainer: TinkerNorth <noreply@tinkernorth.invalid>
          Description: Low-latency Xbox controller forwarding over LAN.
           Receives encrypted XUSB reports and synthesizes a virtual gamepad
           through /dev/uinput.
          EOF
          mkdir -p stage
          fakeroot dpkg-deb --build "${pkg}" "stage/satellite_${{ steps.ver.outputs.version }}_amd64.deb"

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          appdir="${RUNNER_TEMP}/Satellite.AppDir"
          mkdir -p "${appdir}"
          mkdir -p "${appdir}/usr/share/applications" "${appdir}/usr/share/icons/hicolor/256x256/apps"
          cat > "${appdir}/usr/share/applications/satellite.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=Satellite
          Exec=satellite
          Icon=satellite
          Categories=Game;Utility;
          Terminal=false
          EOF
          ./linuxdeploy --appdir "${appdir}" \
            --executable satellite \
            --desktop-file "${appdir}/usr/share/applications/satellite.desktop" \
            --icon-file icon.ico \
            --output appimage || true
          mv Satellite*.AppImage "stage/satellite-${{ steps.ver.outputs.version }}-x86_64.AppImage" || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux
          path: stage/

  # ─────────────────────────────────────────────────────────────────────
  # harden: artifact-level vuln scan, SBOMs, checksums, cosign keyless
  # signing. Runs after every per-platform build job.
  # ─────────────────────────────────────────────────────────────────────
  harden:
    name: Harden artifacts (scan, SBOM, sign)
    needs: [windows, macos, linux]
    runs-on: ubuntu-24.04
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts

      - name: Flatten layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -print0 \
            | xargs -0 -I{} cp -v "{}" release/
          ls -l release/

      # Anchore Grype: scan every binary in release/ for CVEs.
      - name: Vulnerability scan (Grype)
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v3.6.4
        id: grype
        with:
          path: release/
          severity-cutoff: high
          fail-build: true
          only-fixed: false
          add-cpes-if-none: true
          output-format: sarif

      - name: Upload Grype SARIF to code scanning
        if: ${{ always() && steps.grype.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: release-grype

      # Syft: produce SPDX + CycloneDX SBOMs for each artifact.
      - name: Generate SBOMs (Syft)
        uses: anchore/sbom-action@8d0a6505bf28ced3e85154d13dc6af83299e13f1 # v0.17.4
        with:
          path: release/
          format: spdx-json
          output-file: release/satellite.sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM (Syft)
        uses: anchore/sbom-action@8d0a6505bf28ced3e85154d13dc6af83299e13f1 # v0.17.4
        with:
          path: release/
          format: cyclonedx-json
          output-file: release/satellite.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Install cosign (upstream binary)
        shell: bash
        env:
          COSIGN_VERSION: "2.4.1"
          # Pin upstream SHA-256 of cosign-linux-amd64. Verify with:
          #   gh release view v${COSIGN_VERSION} -R sigstore/cosign --json assets
          COSIGN_SHA256: "8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b" # cosign-linux-amd64 v2.4.1
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/cosign \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
          if [ "${COSIGN_SHA256}" != "TODO_REPLACE_WITH_UPSTREAM_SHA256" ]; then
            echo "${COSIGN_SHA256}  /tmp/cosign" | sha256sum -c -
          else
            echo "::warning::COSIGN_SHA256 is unset — replace with the upstream SHA-256 to enforce binary integrity."
          fi
          chmod +x /tmp/cosign
          sudo mv /tmp/cosign /usr/local/bin/cosign
          cosign version

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd release
          # `sha256sum --binary` produces deterministic, byte-mode digests.
          # Sort so the file order is stable regardless of how artifacts
          # arrived.
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs -d '\n' sha256sum --binary > SHA256SUMS
          cat SHA256SUMS

      - name: Cosign-sign each artifact + SHA256SUMS (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cd release
          for f in *; do
            case "$f" in
              *.sig|*.crt|SHA256SUMS.sig|SHA256SUMS.crt) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done
          ls -l

      - name: Compute base64 SHA256 hashes for SLSA provenance
        id: hashes
        shell: bash
        run: |
          set -euo pipefail
          cd release
          # SLSA generic generator wants `<base64>  <name>` lines, base64-encoded.
          h=$(find . -maxdepth 1 -type f ! -name '*.sig' ! -name '*.crt' \
                  -printf '%f\n' \
                | LC_ALL=C sort \
                | xargs -d '\n' sha256sum \
                | base64 -w0)
          echo "hashes=${h}" >> "$GITHUB_OUTPUT"

      - name: Upload hardened bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle
          path: release/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # SLSA L3 provenance generation. The reusable workflow runs in its own
  # privileged context (id-token: write) and emits an .intoto.jsonl
  # attestation pinned to the harden job's output hashes.
  # ─────────────────────────────────────────────────────────────────────
  provenance:
    name: SLSA L3 provenance
    needs: [harden]
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: ${{ needs.harden.outputs.hashes }}
      provenance-name: satellite.intoto.jsonl
      upload-assets: false

  # ─────────────────────────────────────────────────────────────────────
  # publish: attach hardened bundle + SLSA provenance to the GitHub
  # Release. This is the only job that touches the release page.
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to GitHub Releases
    needs: [harden, provenance]
    runs-on: ubuntu-24.04
    steps:
      - name: Download hardened bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: release-bundle
          path: release

      - name: Download SLSA provenance
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: release

      - name: Show what we're about to publish
        run: find release -type f -printf '%p\n'

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release/**/*
