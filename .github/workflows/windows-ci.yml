name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test, lint, format
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # MinGW-w64 toolchain (matches the local build documented in
      # docs/architecture.md and the -mwindows / -static link flags in
      # CMakeLists.txt). MSVC is not used here because the ViGEmClient and
      # libsodium static libs are vendored as MinGW-built archives.
      - name: Set up MSYS2 / MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            python3
            python-pip
            git

      # Pin clang-format to 22.1.4 (PyPI wheel) so the Windows runner agrees
      # with macos-ci.yml (Homebrew LLVM 22.x) and linux-ci.yml (pipx-installed
      # 22.1.4) on braced-init lists and other style rules.
      - name: Install clang-format (pinned)
        run: |
          python3 -m pip install --user --break-system-packages 'clang-format==22.1.4'
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Tool versions
        run: |
          cmake --version
          g++ --version | head -1
          clang-format --version

      - name: clang-format (check only)
        run: |
          FILES=$(find src tests -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.mm' \))
          echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: Configure (Release, MinGW Makefiles)
        run: cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

      - name: Verify satellite.exe was produced
        run: |
          test -f satellite.exe
          file satellite.exe

      - name: Upload satellite.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: satellite-windows-x64
          path: satellite.exe
          retention-days: 14
