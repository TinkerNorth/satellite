name: macOS CI

# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout         @ v7.0.0 → 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact  @ v7.0.1 → 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test, lint, format
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config libsodium clang-format

      - name: Tool versions
        run: |
          cmake --version
          clang++ --version
          clang-format --version
          pkg-config --modversion libsodium

      - name: clang-format (check only)
        run: |
          FILES=$(find src tests -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.mm' \))
          echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      # Bare `-j` is unlimited parallelism; macOS runners swap instead of
      # OOM-killing, which shows up as a multi-hour hang — bound to the
      # core count (see codeql.yml's build step note).
      - name: Build
        run: cmake --build build --config Release -j "$(sysctl -n hw.ncpu)"

      # Runs every suite, including test_macos_ds4_report (pure DS4 codec)
      # and mac_hid_smoke. The smoke test needs the
      # com.apple.developer.hid.virtual.device entitlement to create real
      # kernel devices; GitHub runners are unentitled, so it asserts the
      # probe-fallback contract and then exits 77, which SKIP_RETURN_CODE
      # maps to "Skipped" (never a failure, never a silent pass).
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Verify .app bundle layout
        run: |
          test -x satellite.app/Contents/MacOS/satellite
          test -f satellite.app/Contents/Resources/web/index.html

      # CI builds are UNENTITLED: the IOHIDUserDevice backend requires the
      # com.apple.developer.hid.virtual.device entitlement (production,
      # signed builds), so this artifact's runtime probe falls back to the
      # inert backend — it serves the web UI, pairs, and authenticates but
      # cannot synthesize virtual gamepads. The artifact name reflects that
      # so a user downloading it from a CI run isn't surprised by
      # backendUnavailable responses to controller descriptors.
      - name: Upload .app artifact (stub, no virtual gamepad)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: satellite-macos-stub.app
          path: satellite.app
          retention-days: 14
