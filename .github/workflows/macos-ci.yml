name: macOS CI

# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout         @ v4.2.2 → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/upload-artifact  @ v4.4.3 → b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test, lint, format
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config libsodium clang-format

      - name: Tool versions
        run: |
          cmake --version
          clang++ --version
          clang-format --version
          pkg-config --modversion libsodium

      - name: clang-format (check only)
        run: |
          FILES=$(find src tests -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.mm' \))
          echo "$FILES" | xargs clang-format --dry-run --Werror

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Verify .app bundle layout
        run: |
          test -x satellite.app/Contents/MacOS/satellite
          test -f satellite.app/Contents/Resources/web/index.html

      # The macOS build is a *stub*: it serves the web UI, pairs, and
      # authenticates but cannot synthesize virtual gamepads (no signed
      # DriverKit equivalent of ViGEmBus). The artifact name reflects that
      # so a user downloading it from a CI run isn't surprised by
      # ACK_ERR_VIGEM_UNAVAIL responses to controller-add requests.
      - name: Upload .app artifact (stub — no virtual gamepad)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: satellite-macos-stub.app
          path: satellite.app
          retention-days: 14
