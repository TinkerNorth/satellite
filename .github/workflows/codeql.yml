name: CodeQL

# Source-level static analysis for satellite (C++ only).
#
# `cpp` covers all three platform builds. The matrix below picks the Linux
# build because it's the cheapest and exercises the full set of
# core/net/adapters/platform sources via the Linux platform target.
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout         @ v7.0.0  → 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   github/codeql-action/init    @ v4.37.0 → 99df26d4f13ea111d4ec1a7dddef6063f76b97e9
#   github/codeql-action/analyze @ v4.37.0 → 99df26d4f13ea111d4ec1a7dddef6063f76b97e9

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libsodium-dev libcurl4-openssl-dev \
            libayatana-appindicator3-dev libgtk-3-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          # We drive our own cmake build; without this CodeQL warns and falls back.
          build-mode: manual
          # Default + security-extended; surface error-severity findings.
          queries: security-extended,security-and-quality

      - name: Build (Release, tray enabled)
        # Standard private-repo runners are 2 vCPU / 7 GB. An unbounded `-j`
        # reads the host core count (not the cgroup cap) and oversubscribes,
        # and CodeQL's extractor multiplies per-compile memory; together they
        # OOM-reclaim the runner (SIGTERM / exit 143). Pin `-j 2` and build only
        # the `satellite` target: it already compiles every core/net/adapters/
        # platform source CodeQL needs to analyze, while skipping the test
        # executables that just duplicate-compile those sources.
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target satellite -j 2

      - name: Perform CodeQL analysis
        # SARIF upload requires GitHub Advanced Security on private repos.
        # `continue-on-error` keeps the analysis running and surfacing
        # findings in the logs while GHAS enablement is still pending
        # (see HANDOFF.md item 5).
        continue-on-error: true
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          category: "/language:${{ matrix.language }}"
          upload: failure-only
