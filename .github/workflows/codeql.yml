name: CodeQL

# Source-level static analysis for satellite (C++ only).
#
# `cpp` covers all three platform builds — the matrix below picks the
# Linux build because it's the cheapest and exercises the full set of
# core/net/adapters/platform sources via the Linux platform target.
#
# Pin map (verify with `gh api repos/<owner>/<repo>/git/ref/tags/<tag>`):
#   actions/checkout         @ v4.2.2  → 11bd71901bbe5b1630ceea73d27597364c9af683
#   github/codeql-action/*   @ v3.27.0 → 662472033e021d55d94146f66f6058822b0b39fd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libsodium-dev \
            libayatana-appindicator3-dev libgtk-3-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          languages: ${{ matrix.language }}
          # Default + security-extended; surface error-severity findings.
          queries: security-extended,security-and-quality

      - name: Build (Release, tray enabled)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j

      - name: Perform CodeQL analysis
        # SARIF upload requires GitHub Advanced Security on private repos.
        # `continue-on-error` keeps the analysis running and surfacing
        # findings in the logs while GHAS enablement is still pending —
        # see HANDOFF.md item 5.
        continue-on-error: true
        uses: github/codeql-action/analyze@662472033e021d55d94146f66f6058822b0b39fd # v3.27.0
        with:
          category: "/language:${{ matrix.language }}"
          upload: failure-only
