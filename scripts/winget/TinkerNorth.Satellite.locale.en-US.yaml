ShortDescription: Low-latency Xbox controller forwarding over LAN -- tray app + local web UI.
Description: |-
  Satellite is a Windows tray application that turns a PC into a low-latency
  receiver for Xbox controller input forwarded over your LAN. It uses the
  ViGEmBus kernel driver to expose received input as a virtual Xbox 360
  gamepad to games, supports rumble and full controller motion (gyro and
  accelerometer via the DualShock 4 extended report), and offers an
  in-browser admin UI at http://localhost:9877 for pairing, status, and
  configuration.
